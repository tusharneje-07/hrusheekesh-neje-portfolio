<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Designing India's Largest B2B Healthcare Marketplace | Hrusheekesh Neje</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./assets/css/styles.css" />
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: 'Manrope', sans-serif;
        background: radial-gradient(circle at 20% 0%, #eef3f8 0%, #f4f4f4 46%, #f2f2f2 100%);
        color: #121212;
      }
      .top-nav {
        position: sticky;
        top: 0;
        z-index: 20;
        padding: 18px 16px;
        background: rgba(255, 255, 255, 0.84);
        backdrop-filter: blur(9px);
      }
      .top-nav::after {
        content: "";
        position: absolute;
        left: 0;
        bottom: 0;
        width: 100%;
        height: 1px;
        background: linear-gradient(to left, transparent, rgba(0, 0, 0, 0.18), transparent);
      }
      .wrap {
        max-width: 1100px;
        margin: 0 auto;
      }
      .top-nav-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .btn-back {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 11px 22px 11px 18px;
        border-radius: 999px;
        text-decoration: none;
        background: #111;
        color: #fff;
        font-size: 14px;
        font-weight: 600;
      }
      .btn-back svg { width: 14px; height: 14px; }
      .theme-toggle {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 44px;
        height: 44px;
        border-radius: 14px;
        border: 1px solid #d7d7d7;
        background: #0b2742;
        box-shadow: 0 10px 22px rgba(10, 30, 52, 0.25);
        cursor: pointer;
      }
      .theme-toggle img { width: 22px; height: 22px; transition: transform .26s ease, filter .26s ease; }
      .theme-toggle.is-active img { transform: rotate(180deg); }
      .stage {
        min-height: calc(100vh - 90px);
        padding: 40px 20px 50px;
        display: grid;
        place-items: center;
      }
      .card {
        width: min(760px, 100%);
        padding: clamp(26px, 5vw, 48px);
        border: 1px solid #e0e0e0;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.82);
        box-shadow: 0 24px 50px rgba(0, 0, 0, 0.07);
        text-align: center;
      }
      .badge {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.2em;
        color: #fe941e;
        text-transform: uppercase;
      }
      h1 {
        margin: 14px 0 10px;
        font-family: 'Agrandir', 'Manrope', sans-serif;
        font-size: clamp(30px, 5vw, 54px);
        line-height: 1.06;
      }
      p {
        margin: 0 auto;
        max-width: 560px;
        font-size: clamp(15px, 2.1vw, 18px);
        color: #575757;
      }
      .stack {
        margin: 34px auto 0;
        width: min(150px, 100%);
        height: 120px;
        position: relative;
      }
      .stack-icon {
        position: absolute;
        inset: 0;
        margin: auto;
        width: clamp(78px, 19vw, 104px);
        transform-origin: center;
        will-change: transform, opacity;
        opacity: 0;
        transform: scale(0.72) rotate(-14deg);
        animation: iconCycle 4.2s ease-in-out infinite;
      }
      .stack-icon--figma { animation-delay: 0s; }
      .stack-icon--xd { animation-delay: 1.4s; }
      .stack-icon--ps { animation-delay: 2.8s; }
      .stack-icon--ai { animation-delay: 4.2s; }
      @keyframes iconCycle {
        0%, 100% {
          opacity: 0;
          transform: perspective(500px) rotateX(72deg) scale(0.72) rotate(-14deg);
        }
        12%, 38% {
          opacity: 1;
          transform: perspective(500px) rotateX(0deg) scale(1) rotate(0deg);
        }
        52% {
          opacity: 0;
          transform: perspective(500px) rotateX(-72deg) scale(0.82) rotate(14deg);
        }
      }
      @media (max-width: 640px) {
        .stack { width: 132px; height: 108px; }
        .stack-icon { width: 86px; }
      }

      body[data-theme="dark"] { background: #121212; color: #eceff4; }
      body[data-theme="dark"] .top-nav { background: rgba(18, 18, 18, 0.84); }
      body[data-theme="dark"] .card { background: #1c1c1f; border-color: #34343a; box-shadow: 0 24px 50px rgba(0,0,0,.32); }
      body[data-theme="dark"] h1 { color: #f3f5f8; }
      body[data-theme="dark"] p { color: #b8c0cd; }
      body[data-theme="dark"] .theme-toggle { background:#27272e; border-color:#464650; box-shadow: 0 10px 22px rgba(0,0,0,.38); }
      body[data-theme="dark"] .theme-toggle img { filter: brightness(1.15) saturate(0.9); }
      body[data-theme="dark"] .btn-back { background: #26262d; color: #eff3f8; border: 1px solid #44444e; }
      body[data-theme="dark"] .btn-back:hover { background: #2f2f38; }
    </style>
  </head>
  <body>
    <nav class="top-nav">
      <div class="wrap">
        <div class="top-nav-row">
          <a href="./index.html#projects" class="btn-back">
            <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M10 12L6 8L10 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            Back
          </a>
          <button type="button" class="theme-toggle" data-theme-toggle aria-label="Toggle theme" aria-pressed="false">
            <img src="./assets/images/homepage/theme_toggle.svg" alt="" />
          </button>
        </div>
      </div>
    </nav>
    <main class="stage">
      <article class="card">
        <span class="badge">Case Study</span>
        <h1>Designing India's Largest B2B Healthcare Marketplace</h1>
        <p>Drafting it soon. This case study is in progress while I shape the narrative, visuals, and outcomes for a clean walkthrough.</p>
        <div class="stack" aria-hidden="true">
          <img class="stack-icon stack-icon--figma" src="./assets/images/homepage/stack_figma.svg" alt="" />
          <img class="stack-icon stack-icon--xd" src="./assets/images/homepage/stack_adobe_xd.svg" alt="" />
          <img class="stack-icon stack-icon--ps" src="./assets/images/homepage/stack_photoshop.svg" alt="" />
          <img class="stack-icon stack-icon--ai" src="./assets/images/homepage/stack_illustratar.svg" alt="" />
        </div>
      </article>
    </main>
    <script>
      const themeToggles = document.querySelectorAll('[data-theme-toggle]');
      const THEME_STORAGE_KEY = 'hrushee-theme';
      const applyTheme = (theme) => {
        const isDark = theme === 'dark';
        document.body.setAttribute('data-theme', isDark ? 'dark' : 'light');
        themeToggles.forEach((toggle) => {
          toggle.classList.toggle('is-active', isDark);
          toggle.setAttribute('aria-pressed', isDark ? 'true' : 'false');
        });
      };
      const storedTheme = localStorage.getItem(THEME_STORAGE_KEY);
      const initialTheme = storedTheme === 'dark' || storedTheme === 'light'
        ? storedTheme
        : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      applyTheme(initialTheme);
      themeToggles.forEach((toggle) => {
        toggle.addEventListener('click', () => {
          const nextTheme = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
          applyTheme(nextTheme);
          localStorage.setItem(THEME_STORAGE_KEY, nextTheme);
        });
      });
    </script>
  </body>
</html>
